<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bicicleta aro 29&quot; Oferta relâmpago com desconto e frete grátis.">
    <meta name="theme-color" content="#FF5722">
    <meta name="color-scheme" content="light dark">
    <title>Oferta Relâmpago - Bicicleta aro 29</title>

    <!-- Prevent flash of wrong theme -->
    <script>
        (function() {
            var saved = localStorage.getItem('theme-preference');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #FFEDE6;
            --surface: #ffffff;
            --surface-border: #f9fafb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --icon-color: #374151;
            --card-shadow: 0 2px 10px rgba(0,0,0,.03);
            --image-bg: #f3f4f6;
            --urgency-bg: #FFF4ED;
            --urgency-border: #FFDCC4;
            --countdown-bg: #ffffff;
            --countdown-border: rgba(255,220,196,.5);
            --countdown-shadow: 0 1px 2px rgba(0,0,0,.06);
            --trust-item-bg: rgba(249,250,251,.8);
            --trust-item-border: #f3f4f6;
            --skip-bg: #000000;
            --toggle-bg: rgba(255,255,255,.15);
            --toggle-hover: rgba(255,255,255,.25);
        }

        html.dark {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface-border: #2a2a3e;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --icon-color: #cbd5e1;
            --card-shadow: 0 2px 10px rgba(0,0,0,.3);
            --image-bg: #25253a;
            --urgency-bg: #1e1a16;
            --urgency-border: #3d2a1a;
            --countdown-bg: #25253a;
            --countdown-border: rgba(255,140,50,.15);
            --countdown-shadow: 0 1px 2px rgba(0,0,0,.3);
            --trust-item-bg: rgba(37,37,58,.8);
            --trust-item-border: #2a2a3e;
            --skip-bg: #1a1a2e;
            --toggle-bg: rgba(255,255,255,.08);
            --toggle-hover: rgba(255,255,255,.15);
        }

        body {
            min-height: 100dvh;
            background: var(--bg);
            display: flex;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            transition: background .3s, color .3s;
        }

        ::selection { background: #FF5722; color: #fff; }

        .skip-link {
            position: absolute;
            top: -100%;
            left: 1rem;
            background: var(--skip-bg);
            color: #fff;
            padding: .5rem 1rem;
            border-radius: 0 0 8px 8px;
            z-index: 100;
            font-weight: 600;
            text-decoration: none;
            transition: top .2s;
        }
        .skip-link:focus { top: 0; }

        .container {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-bottom: 2.5rem;
        }

        .header {
            background: #000;
            color: #fff;
            text-align: center;
            padding: .625rem 1rem;
            font-size: .875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .375rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header svg { width: 16px; height: 16px; color: #facc15; flex-shrink: 0; }
        .header-title { flex: 1; }

        .theme-toggle {
            position: absolute;
            right: .75rem;
            background: var(--toggle-bg);
            border: none;
            cursor: pointer;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, transform .15s;
            -webkit-tap-highlight-color: transparent;
        }

        .theme-toggle:hover { background: var(--toggle-hover); }
        .theme-toggle:active { transform: scale(.9); }
        .theme-toggle:focus-visible { outline: 2px solid #facc15; outline-offset: 2px; }
        .theme-toggle svg { width: 18px; height: 18px; color: #fff; }

        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }
        html.dark .theme-toggle .icon-sun { display: block; }
        html.dark .theme-toggle .icon-moon { display: none; }

        .card {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--surface-border);
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            transition: background .3s, border-color .3s, box-shadow .3s;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: var(--image-bg);
            transition: background .3s;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            mix-blend-mode: multiply;
        }

        html.dark .image-wrapper img {
            mix-blend-mode: normal;
            opacity: .92;
        }

        .badge {
            position: absolute;
            padding: .25rem .625rem;
            border-radius: 6px;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .025em;
            display: flex;
            align-items: center;
            gap: .375rem;
            line-height: 1;
        }

        .badge-discount { top: .75rem; left: .75rem; background: #E53935; color: #fff; }
        .badge-shipping { bottom: .75rem; right: .75rem; background: #43A047; color: #fff; }
        .badge svg { width: 14px; height: 14px; flex-shrink: 0; }

        .stars { display: flex; align-items: center; gap: 1px; color: #eab308; margin-bottom: .25rem; }
        .stars svg { width: 14px; height: 14px; fill: #eab308; }
        .stars-text { color: var(--text-secondary); font-size: .75rem; margin-left: .25rem; font-weight: 500; }

        .product-title { font-size: 1.125rem; font-weight: 700; line-height: 1.3; color: var(--text-primary); }

        .price-old { color: var(--text-muted); font-size: .875rem; text-decoration: line-through; display: block; }
        .price-row { display: flex; align-items: baseline; gap: .5rem; flex-wrap: wrap; }
        .price-main { font-size: 1.875rem; font-weight: 800; color: var(--text-primary); }
        .price-cents { font-size: 1.125rem; font-weight: 700; color: var(--text-primary); }
        .price-installments { font-size: .875rem; font-weight: 500; color: var(--text-secondary); margin-left: .25rem; }

        .urgency-bar {
            background: var(--urgency-bg);
            border: 1px solid var(--urgency-border);
            border-radius: 10px;
            padding: .875rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 3px rgba(0,0,0,.04);
            transition: background .3s, border-color .3s;
        }

        .urgency-label { display: flex; align-items: center; gap: .5rem; font-size: .875rem; font-weight: 600; color: #D84315; }
        .urgency-label svg { width: 18px; height: 18px; color: #FF5722; flex-shrink: 0; }

        .countdown {
            font-size: 1.125rem;
            font-weight: 700;
            color: #D84315;
            font-variant-numeric: tabular-nums;
            letter-spacing: -.02em;
            background: var(--countdown-bg);
            padding: .25rem .625rem;
            border-radius: 6px;
            box-shadow: var(--countdown-shadow);
            border: 1px solid var(--countdown-border);
            transition: background .3s, border-color .3s;
        }

        .cta-button {
            width: 100%;
            background: #FF5722;
            color: #fff;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: .625rem;
            box-shadow: 0 4px 14px rgba(255,87,34,.3);
            transition: background .2s, transform .15s, box-shadow .2s;
            -webkit-tap-highlight-color: transparent;
            margin-top: .5rem;
        }

        .cta-button:hover { background: #F4511E; box-shadow: 0 6px 20px rgba(255,87,34,.35); }
        .cta-button:active { transform: scale(.98); }

        .cta-button:focus-visible, .skip-link:focus {
            outline: 3px solid #FF5722;
            outline-offset: 2px;
        }

        .cta-button svg { width: 20px; height: 20px; flex-shrink: 0; }

        .trust-section {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--surface-border);
            padding: 1rem;
            transition: background .3s, border-color .3s, box-shadow .3s;
        }

        .trust-title { text-align: center; font-size: .875rem; font-weight: 600; color: var(--text-primary); margin-bottom: 1rem; }
        .trust-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

        .trust-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .5rem;
            background: var(--trust-item-bg);
            padding: .75rem;
            border-radius: 10px;
            text-align: center;
            border: 1px solid var(--trust-item-border);
            transition: background .3s, border-color .3s;
        }

        .trust-item svg { width: 22px; height: 22px; color: var(--icon-color); flex-shrink: 0; }

        .trust-item-label {
            font-size: .6875rem;
            font-weight: 600;
            color: var(--icon-color);
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }

        @media print {
            .header, .urgency-bar, .cta-button { display: none; }
            body { background: #fff; }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Pular para o conteúdo principal</a>

    <div class="container">
        <header class="header">
            <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 10 10-12h-9l1-10z"/></svg>
            <span class="header-title">Oferta Relâmpago</span>
            <button class="theme-toggle" type="button" aria-label="Alternar para modo escuro" title="Alternar tema">
                <svg class="icon-moon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </header>

        <main id="main-content" class="card">
            <figure class="image-wrapper">
                <img src="https://images.unsplash.com/photo-1593640408182-31c70c8268f5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Bicicleta aro 29" width="800" height="800" loading="eager" fetchpriority="high" decoding="async"/>
                <span class="badge badge-discount" aria-label="Desconto de 52 por cento">ON</span>
                <span class="badge badge-shipping" aria-label="Frete grátis">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>
                    <!-- FRETE GRÁTIS -->
                </span>
            </figure>

            <div>
                <div class="stars" role="img" aria-label="Avaliação 4.9 de 5 estrelas, mais de 2.400 vendidos">
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span class="stars-text">(4.9/5) +1 vendidos</span>
                </div>
                <h1 class="product-title">Bicicleta aro 29</h1>
                <div aria-label="Preço: de R$ 700 por R$ 500 em até 12 parcelas">
                    <span class="price-old" aria-hidden="true">De R$ 700</span>
                    <div class="price-row">
                        <span class="price-main">R$ 500</span>
                        <span class="price-cents">,00</span>
                        <span class="price-installments">em até 6x</span>
                    </div>
                </div>
            </div>

            <div class="urgency-bar" aria-label="Oferta expira em">
                <div class="urgency-label">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>A oferta expira em:</span>
                </div>
                <div id="countdown-display" class="countdown" aria-hidden="true">17:31</div>
            </div>

            <button class="cta-button" type="button" aria-label="Ver produto na Shopee - redireciona para o checkout">
                <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
                VER PRODUTO
            </button>
        </main>

        <section class="trust-section" aria-labelledby="trust-heading">
            <h2 id="trust-heading" class="trust-title">Por que comprar com a gente?</h2>
            <div class="trust-grid">
                <div class="trust-item">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/></svg>
                    <span class="trust-item-label">Entrega Rápida</span>
                </div>
                <div class="trust-item">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
                    <span class="trust-item-label">Compra Segura</span>
                </div>
                <div class="trust-item">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                    <span class="trust-item-label">Pague Fácil</span>
                </div>
                <div class="trust-item">
                    <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span class="trust-item-label">Oferta Limitada</span>
                </div>
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const html = document.documentElement;
            const toggleBtn = document.querySelector('.theme-toggle');
            const STORAGE_KEY = 'theme-preference';

            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved === 'dark' || saved === 'light') {
                html.classList.toggle('dark', saved === 'dark');
            }
            toggleBtn.setAttribute('aria-label', html.classList.contains('dark') ? 'Alternar para modo claro' : 'Alternar para modo escuro');

            toggleBtn.addEventListener('click', () => {
                const isDark = html.classList.toggle('dark');
                localStorage.setItem(STORAGE_KEY, isDark ? 'dark' : 'light');
                toggleBtn.setAttribute('aria-label', isDark ? 'Alternar para modo claro' : 'Alternar para modo escuro');
            });

            let timeLeft = 17 * 60 + 31;
            const el = document.getElementById('countdown-display');
            const fmt = (s) => String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
            const tick = setInterval(() => {
                if (timeLeft <= 0) { clearInterval(tick); return; }
                timeLeft--;
                el.textContent = fmt(timeLeft);
            }, 1000);
        });
    </script>
</body>
</html>
